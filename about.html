<!DOCTYPE html>
<html lang="id">
<head>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:#fff;
}
.wrapper{
    max-width:420px;
    margin:auto;
    padding:12px;
    background:linear-gradient(180deg,#111,#000);
}
.header{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    color:#ffd700;
    margin-bottom:10px;
}
.photo img{
    width:100%;
    border-radius:10px;
    display:block;
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}
.banner{
    background:linear-gradient(90deg,#3a2c00,#ffd700,#3a2c00);
    color:#000;
    text-align:center;
    padding:10px;
    margin:12px 0;
    border-radius:8px;
    font-weight:bold;
}
.buttons{
    display:flex;
    gap:10px;
    margin-bottom:16px;
}
.buttons a{
    flex:1;
    text-align:center;
    padding:14px;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    position:relative;
    z-index:1;
}

/* 🔥🔥🔥 DAFTAR AURA SUPER MENYALA */
.daftar{
    background:linear-gradient(#ffe066,#ffb700);
    color:#000;
    animation: glow 1.2s infinite ease-in-out;
}

/* AURA PALING TERANG */
@keyframes glow{
    0%{
        box-shadow:
            0 0 10px rgba(255,215,0,0.6),
            0 0 25px rgba(255,215,0,0.6),
            0 0 45px rgba(255,215,0,0.4);
    }
    50%{
        box-shadow:
            0 0 18px rgba(255,215,0,0.95),
            0 0 40px rgba(255,215,0,0.9),
            0 0 70px rgba(255,215,0,0.8),
            0 0 100px rgba(255,215,0,0.6);
    }
    100%{
        box-shadow:
            0 0 12px rgba(255,215,0,0.7),
            0 0 30px rgba(255,215,0,0.7),
            0 0 55px rgba(255,215,0,0.5);
    }
}

.login{
    background:linear-gradient(#222,#000);
    color:#ffd700;
    border:1px solid #ffd700;
}

/* INFO PUTIH */
.info{
    background:#0c0c0c;
    padding:14px;
    font-size:14px;
    border-radius:8px;
    border:1px solid #333;
    color:#ffffff;
    line-height:1.6;
}

.footer{
    text-align:center;
    font-size:11px;
    margin-top:10px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header"></div>

    <!-- FOTO BISA DIKLIK -->
    <a href="https://rebrand.ly/metzone">
        <div class="photo">
            <img src="https://s12.gifyu.com/images/bkAyX.jpg" alt="Promo LEBAH55" loading="lazy">
        </div>
    </a>

    <div class="banner">
        Slot Gacor Terpercaya #1<br>
        se-INDONESIA
    </div>

    <!-- TOMBOL -->
    <div class="buttons">
        <a href="https://rebrand.ly/metzone" class="daftar">DAFTAR</a>
        <a href="https://rebrand.ly/metzone" class="login">LOGIN</a>

    <div class="info">
        Nama: LEBAH55<br>
        Payment: QRIS , Bank Transfer & E-Wallet<br>

</div>
